name: Cross-Claude Bridge Poll
# Polls the task bus every 10 min + sends Telegram notifications for completed/failed tasks.
# Free GitHub Actions cron because Vercel Hobby cron is daily-only.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Hit bridge-poll endpoint
        run: |
          curl -sS -X POST "https://xpert-command-center.vercel.app/api/bridge-poll" \
            -H "Content-Type: application/json" \
            -w "\nstatus: %{http_code}\n" || true
